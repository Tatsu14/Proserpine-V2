<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recherche - Proserpine</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
</head>
<body>
    <div id="app-container" class="content-with-nav">
        <header class="search-header">
            <form id="search-form" class="search-bar">
                <span class="material-symbols-rounded search-icon">search</span>
                <input type="text" id="search-input" class="search-input" placeholder="Rechercher un produit, une marque..." autocomplete="off">
                <button type="button" id="clear-btn" class="clear-btn"><span class="material-symbols-rounded">close</span></button>
                <button type="submit" id="submit-btn" class="search-btn"><span class="material-symbols-rounded">arrow_forward</span></button>
            </form>
        </header>
        
        <main class="results-container">
            <!-- État initial : Recherches récentes -->
            <div id="recent-container">
                <h2 class="section-title">Recherches récentes</h2>
                <div id="recent-list"></div>
            </div>
            
            <!-- Résultats de recherche -->
            <div id="results-container" class="d-none">
                <div id="results-list"></div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/pages/recherche.js"></script>
</body>
</html>
