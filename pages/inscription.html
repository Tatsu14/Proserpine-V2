<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Inscription - Proserpine</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
</head>
<body>
    <div id="app-container">
        <!-- Splash Screen géré par auth.js -->
        <div id="splash-screen" class="splash-screen">
            <div class="splash-logo-container"><span class="material-symbols-rounded splash-logo-icon">eco</span></div>
            <div class="splash-spinner"></div>
        </div>
        
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <span class="material-symbols-rounded">eco</span>
                </div>
                <h1 class="auth-title">Créer un compte</h1>
                <p class="auth-subtitle">Rejoignez Proserpine et agissez pour la planète</p>
                
                <form id="register-form">
                    <div id="auth-error" class="auth-error"></div>
                    
                    <div class="input-group">
                        <label class="input-label" for="username">Nom d'utilisateur</label>
                        <input type="text" id="username" class="input-field" required>
                        <div class="input-error-msg" id="err-username">3-20 caractères (lettres, chiffres, _ ou -)</div>
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label" for="email">Adresse e-mail</label>
                        <input type="email" id="email" class="input-field" required>
                        <div class="input-error-msg" id="err-email">Format d'e-mail invalide</div>
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label" for="password">Mot de passe</label>
                        <input type="password" id="password" class="input-field" required>
                        <div class="input-error-msg" id="err-password">8+ car, 1 maj, 1 chiffre, 1 spécial</div>
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label" for="confirm">Confirmation du mot de passe</label>
                        <input type="password" id="confirm" class="input-field" required>
                        <div class="input-error-msg" id="err-confirm">Les mots de passe ne correspondent pas</div>
                    </div>
                    
                    <button type="submit" class="btn-primary mt-4" id="submit-btn" disabled>S'inscrire</button>
                </form>
                
                <div class="auth-links">
                    Déjà un compte ? <a href="connexion.html">Se connecter</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/inscription.js"></script>
</body>
</html>
