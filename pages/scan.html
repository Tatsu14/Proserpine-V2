<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scan - Proserpine</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
</head>
    <!-- Chargement html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="app-container">
        <!-- Conteneur caméra -->
        <div id="reader"></div>
        
        <!-- UI -->
        <button class="back-btn" id="btn-back">
            <span class="material-symbols-rounded">arrow_back</span>
        </button>
        
        <div class="scan-ui-layer">
            <div class="targeting-box">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="laser"></div>
            </div>
            <div class="scan-text" id="scan-indicator">Pointez la caméra vers un code-barre</div>
        </div>
    </div>

    <script type="module" src="../js/pages/scan.js"></script>
</body>
</html>
