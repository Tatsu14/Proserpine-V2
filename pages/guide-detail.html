<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Détail Guide - Proserpine</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
</head>
<body>
    <div id="app-container">
        
        <header class="detail-header" id="header">
            <button class="btn-back-light" id="btn-back">
                <span class="material-symbols-rounded">arrow_back</span>
            </button>
            <span class="material-symbols-rounded header-icon" id="icon">recycling</span>
            <h1 class="header-title" id="title">Chargement...</h1>
        </header>
        
        <main class="detail-content">
            <p class="desc-text" id="desc">...</p>
            
            <div class="list-section accepted">
                <div class="list-title">
                    <span class="material-symbols-rounded">check_circle</span>
                    Accepté
                </div>
                <div class="list-items" id="accepted-list">
                    <!-- Rempli par JS -->
                </div>
            </div>
            
            <div class="list-section refused">
                <div class="list-title">
                    <span class="material-symbols-rounded">cancel</span>
                    Interdit
                </div>
                <div class="list-items" id="refused-list">
                    <!-- Rempli par JS -->
                </div>
            </div>
            
            <div class="local-tip d-none" id="local-tip">
                <span class="material-symbols-rounded local-tip-icon">lightbulb</span>
                <div>
                    <div class="local-tip-title">Conseil Intradel (Liège)</div>
                    <div class="local-tip-text" id="tip-text"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/pages/guide-detail.js"></script>
</body>
</html>
